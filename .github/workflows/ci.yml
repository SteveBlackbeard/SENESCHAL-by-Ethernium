name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build tools
        run: python -m pip install --upgrade pip build pytest
      - name: Install package with measured tokenizer
        run: python -m pip install -e ".[measure]"
      - name: Health
        run: python agentops/health_guard.py --strict
      - name: Tests
        run: pytest -q
      - name: Build
        run: python -m build
