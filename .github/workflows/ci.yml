name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build pytest
      - name: Health
        run: python agentops\health_guard.py --strict
      - name: Tests
        run: pytest -q
      - name: Build
        run: python -m build
