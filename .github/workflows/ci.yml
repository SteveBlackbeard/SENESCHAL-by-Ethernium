name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build tools
        run: python -m pip install --upgrade pip build pytest
      - name: Install package with measured tokenizer and signing
        run: python -m pip install -e ".[measure,security]"
      # Invoke the console script, not the file. `python seneschal/health_guard.py`
      # runs with no parent package, so the guard's relative imports fail and it
      # reports a healthy tree as broken. It is also not how anyone runs it.
      - name: Health
        run: seneschal health --strict
      - name: Tests
        run: pytest -q
      - name: Build
        run: python -m build
